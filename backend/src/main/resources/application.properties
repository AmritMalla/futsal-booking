server.port=${SERVER_PORT:8090}

# PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/futsal_booking}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JDBC Driver for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JPA settings
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Spring Data Initialization
spring.sql.init.mode=embedded
spring.jpa.defer-datasource-initialization=false

# Logging Configuration
logging.level.org.springframework.web=${LOG_LEVEL_WEB:info}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:warn}
logging.level.com.amrit.futsal=${LOG_LEVEL_APP:info}

# API Documentation with SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
file.allowed-extensions=${FILE_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp}

# JWT Configuration
jwt.secret=${JWT_SECRET:futsal_arena_secure_jwt_secret_key_for_authentication_and_authorization}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cors Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}

# App Configuration
app.name=${APP_NAME:FutsalBook}

# Email Configuration (Optional - set these to enable email notifications)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}

# Async Configuration (for email)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
