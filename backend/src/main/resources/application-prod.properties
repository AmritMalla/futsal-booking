# Production profile configuration
# Copy this file and set environment variables or create application-prod.properties with actual values

server.port=${SERVER_PORT:8080}

# PostgreSQL Configuration - Set these via environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Hibernate JPA settings for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging Configuration for production
logging.level.org.springframework.web=warn
logging.level.org.hibernate.SQL=warn
logging.level.com.amrit.futsal=info

# JWT Configuration - Must be set via environment variables in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cors Configuration for production - Restrict to specific origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.exposed-headers=Authorization

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:/var/app/uploads}
