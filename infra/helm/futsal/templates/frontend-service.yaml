apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "futsal.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "futsal.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
